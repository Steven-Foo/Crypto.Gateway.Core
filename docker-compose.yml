# Local development backing services for a reviewable end-to-end run.
#   SQL Server  — the system of record (DBeaver connects to localhost:1433).
#   Redis       — distributed lock + cache; the outbox dispatcher needs it or callbacks won't fire.
#   MongoDB     — chain payloads / energy snapshots (never money truth, §2).
#
# This is DEV ONLY. The SA password is a fixed, documented dev secret — never a production credential.
# Bring up:   docker compose up -d
# Then:       ./tools/dev/Setup-LocalEnv.ps1   (creates the DB + applies every module's migrations)
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cpe-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Cpe_Dev_Passw0rd!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - cpe-sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" -b -o /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: cpe-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: cpe-mongodb
    environment:
      MONGO_INITDB_DATABASE: "CryptoPaymentEngine"
    ports:
      - "27017:27017"
    volumes:
      - cpe-mongodb-data:/data/db
      # First-init only: creates collections + validators + indexes (idempotent). See db/README.md §2.
      - ./db/mongo:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cpe-sqlserver-data:
  cpe-mongodb-data:
